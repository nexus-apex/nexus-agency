{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} AgencyClient | NexusAgency{% endblock %}
{% block page_title %}{% if editing %}Edit AgencyClient{% else %}New AgencyClient{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Company</label>
        <input type="text" name="company" value="{{ record.company|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Industry</label>
        <input type="text" name="industry" value="{{ record.industry|default:'' }}">
      </div>
      <div class="form-group">
        <label>Contract Value</label>
        <input type="number" step="0.01" name="contract_value" value="{{ record.contract_value|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="prospect" {% if record.status == 'prospect' %}selected{% endif %}>Prospect</option>
          <option value="churned" {% if record.status == 'churned' %}selected{% endif %}>Churned</option>
        </select>
      </div>
      <div class="form-group">
        <label>Joined Date</label>
        <input type="date" name="joined_date" value="{{ record.joined_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} AgencyClient</button>
      <a href="/agencyclients/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
