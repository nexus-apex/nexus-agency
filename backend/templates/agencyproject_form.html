{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} AgencyProject | NexusAgency{% endblock %}
{% block page_title %}{% if editing %}Edit AgencyProject{% else %}New AgencyProject{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Client Name</label>
        <input type="text" name="client_name" value="{{ record.client_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Project Type</label>
        <select name="project_type">
          <option value="branding" {% if record.project_type == 'branding' %}selected{% endif %}>Branding</option>
          <option value="web_design" {% if record.project_type == 'web_design' %}selected{% endif %}>Web Design</option>
          <option value="seo" {% if record.project_type == 'seo' %}selected{% endif %}>SEO</option>
          <option value="social_media" {% if record.project_type == 'social_media' %}selected{% endif %}>Social Media</option>
          <option value="content" {% if record.project_type == 'content' %}selected{% endif %}>Content</option>
        </select>
      </div>
      <div class="form-group">
        <label>Budget</label>
        <input type="number" step="0.01" name="budget" value="{{ record.budget|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="proposal" {% if record.status == 'proposal' %}selected{% endif %}>Proposal</option>
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="completed" {% if record.status == 'completed' %}selected{% endif %}>Completed</option>
          <option value="on_hold" {% if record.status == 'on_hold' %}selected{% endif %}>On Hold</option>
        </select>
      </div>
      <div class="form-group">
        <label>Deadline</label>
        <input type="date" name="deadline" value="{{ record.deadline|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Progress</label>
        <input type="number" name="progress" value="{{ record.progress|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} AgencyProject</button>
      <a href="/agencyprojects/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
